name: CI

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'Max/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'Max/**'

jobs:
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['5.6', '7.0', '7.2', '7.4', '8.0', '8.1', '8.2', '8.3']
        include:
          - php-version: '7.4'
            coverage: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json, mbstring, curl
          coverage: ${{ matrix.coverage && 'xdebug' || 'none' }}

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: Max/vendor
          key: composer-${{ matrix.php-version }}-${{ hashFiles('Max/composer.json') }}
          restore-keys: |
            composer-${{ matrix.php-version }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
        working-directory: Max

      - name: Run PHPUnit
        run: vendor/bin/phpunit --configuration phpunit.xml.dist --colors=always
        working-directory: Max
        if: ${{ !matrix.coverage }}

      - name: Run PHPUnit with coverage
        run: vendor/bin/phpunit --configuration phpunit.xml.dist --colors=always --coverage-clover build/coverage.xml
        working-directory: Max
        if: ${{ matrix.coverage }}

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    needs: phpunit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: json, mbstring, curl

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: Max/vendor
          key: composer-7.4-${{ hashFiles('Max/composer.json') }}
          restore-keys: |
            composer-7.4-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
        working-directory: Max

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --configuration phpstan.neon --no-progress
        working-directory: Max

  code-style:
    name: PHP CS Fixer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: Install PHP CS Fixer
        run: composer global require friendsofphp/php-cs-fixer:^3.0 --no-interaction
        working-directory: Max

      - name: Check code style
        run: php-cs-fixer fix --config=.php-cs-fixer.dist.php --dry-run --diff
        working-directory: Max
